<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>SectorRotation — Sector Scores</title>
  <style>
    body{font-family:system-ui, -apple-system, Segoe UI, Roboto, Arial;margin:12px}
    h1{font-size:1.25rem;margin-bottom:0.5rem}
    .meta{color:#555;margin-bottom:1rem}
    table{width:100%;border-collapse:collapse}
    th,td{padding:8px;border-bottom:1px solid #eee;text-align:left}
    th{background:#fafafa}
    .bar{height:12px;background:#2b8cbe;border-radius:2px}
    .center{display:flex;align-items:center}
  </style>
</head>
<body>
  <h1>SectorRotation — Sector Scores</h1>
  <div class="meta" id="meta">Loading...</div>
  <table id="tbl">
    <thead><tr><th>Rank</th><th>Sector</th><th>Trailing Return</th><th>Z-score</th><th>Visual</th></tr></thead>
    <tbody></tbody>
  </table>

  <script>
    async function load() {
      try {
        const r = await fetch('scores.json');
        if(!r.ok) throw new Error('Failed to fetch scores.json: '+r.status);
        const data = await r.json();
        document.getElementById('meta').textContent = 'Updated: '+data.generated_at + '    Lookback: '+data.lookback + ' days';
        const tbody = document.querySelector('#tbl tbody');
        tbody.innerHTML = '';
        const sectors = data.sectors.sort((a,b)=>a.rank - b.rank);
        const maxZ = Math.max(...sectors.map(s=>Math.abs(s.zscore||0)) , 1);
        for(const s of sectors){
          const tr = document.createElement('tr');
          tr.innerHTML = `<td>${s.rank}</td><td>${s.sector}</td><td>${(s.trailing_return!==null? (s.trailing_return*100).toFixed(02)+'%':'-')}</td><td>${(s.zscore!==null? s.zscore.toFixed(2):'-')}</td><td class="center"><div style="width:100%"><div class="bar" style="width:${Math.min(100, Math.abs(s.zscore||0)/maxZ*100)}%"></div></div></td>`;
          tbody.appendChild(tr);
        }
      } catch(e){
        document.getElementById('meta').textContent = 'Error: '+e.message;
      }
    }
    load();
    // Auto-refresh every 5 minutes when open
    setInterval(load, 5*60*1000);
  </script>
</body>
</html>
