name: Update sector scores
on:
  schedule:
    - cron: '0 8 * * *'  # daily at 08:00 UTC
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run score update
        env:
          PERIOD: 1y
          LOOKBACK: 63
        run: |
          python backend/ci_update.py --period "$PERIOD" --lookback "$LOOKBACK"

      - name: Commit results
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # ensure push uses the GITHUB_TOKEN
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
          git add docs/scores.json || true
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update sector scores (automated)"
            git push origin HEAD:main
          fi
